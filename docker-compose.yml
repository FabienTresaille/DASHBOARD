version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bpia_postgres
    environment:
      POSTGRES_USER: bpia_user
      POSTGRES_PASSWORD: bpia_password
      POSTGRES_DB: bpia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: bpia_redis
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: bpia_n8n
    environment:
      - N8N_HOST=n8n.votredomaine.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.votredomaine.com/
      - GENERIC_TIMEZONE=Europe/Paris
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=bpia_db
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=bpia_user
      - DB_POSTGRESDB_PASSWORD=bpia_password
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.votredomaine.com`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  fastapi:
    build: ./backend
    container_name: bpia_fastapi
    environment:
      - DATABASE_URL=postgresql://bpia_user:bpia_password@postgres:5432/bpia_db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=Host(`api.votredomaine.com`)"
      - "traefik.http.routers.fastapi.entrypoints=websecure"
      - "traefik.http.routers.fastapi.tls.certresolver=letsencrypt"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"

volumes:
  postgres_data:
  n8n_data:
